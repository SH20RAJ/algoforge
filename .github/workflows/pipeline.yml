name: Data pipeline

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run fetch
      - run: npm run generate
      - name: Upload generated data
        uses: actions/upload-artifact@v4
        with:
          name: generated-data
          path: data/generated
